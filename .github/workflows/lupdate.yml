name: Qt lupdate

on:
  workflow_dispatch:
  push:
    branches:
      - l10n_main

jobs:
  lupdate:
    name: Run lupdate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update package repositories
        run: sudo apt-get update

      - name: Install Qt l10n tools
        run: sudo apt-get install -y qt6-l10n-tools qt6-tools-dev-tools qmake6

      - name: Run lupdate
        run: |
          export QT_SELECT=qt6
          # Expand PATH to find lupdate & lrelease
          export PATH="/usr/lib/$QT_SELECT/bin:$PATH"
          lupdate stacer/stacer.pro -no-obsolete

      - name: Commit translations
        uses: EndBug/add-and-commit@v9
        with:
          message: "Lint with lupdate"
          add: "translations/*.ts"
          default_author: github_actions
